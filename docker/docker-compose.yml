# ============================================
#  study_rag docker-compose
#
#  服务:
#    - admin   : FastAPI 管理面 (port 8765)
#    - mcp     : MCP standalone server, streamable_http (port 8001)
#    - milvus  : 可选向量库 (profile=vector)
#
#  使用:
#    docker compose up admin mcp
#    docker compose --profile vector up
#    docker compose --profile dev run --rm dev-tools just test
# ============================================

services:
  admin:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: study-rag:dev
    container_name: study-rag-admin
    environment:
      CONTAINER_ROLE: admin
      ADMIN_PORT: "8765"
      # 把 secrets 通过 .env 注入；例：
      # OPENAI_API_KEY: ${OPENAI_API_KEY}
      # COHERE_API_KEY: ${COHERE_API_KEY}
    ports:
      - "8765:8765"
    volumes:
      # 允许本地覆盖配置而无需重新构建镜像
      - ../configs:/app/configs:ro
      - rag-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8765/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  mcp:
    image: study-rag:dev
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: study-rag-mcp
    environment:
      CONTAINER_ROLE: mcp
      MCP_PORT: "8001"
    ports:
      - "8001:8001"
    depends_on:
      admin:
        condition: service_healthy
    volumes:
      - ../configs:/app/configs:ro
      - rag-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-X", "POST", "http://127.0.0.1:8001/mcp"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ---- 调试 / 一次性任务 ----
  dev-tools:
    image: study-rag:dev
    build:
      context: ..
      dockerfile: docker/Dockerfile
    profiles: ["dev"]
    environment:
      CONTAINER_ROLE: admin
    volumes:
      - ..:/app
      - rag-data:/app/data
    working_dir: /app
    command: ["sleep", "infinity"]
    # 进入容器跑命令：
    #   docker compose --profile dev run --rm dev-tools just test
    #   docker compose --profile dev run --rm dev-tools just lint

  # ---- 可选：Milvus 向量库 ----
  # 启用：docker compose --profile vector up
  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.16
    container_name: milvus-etcd
    profiles: ["vector"]
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - milvus-etcd:/etcd
    command: ["etcd", "-advertise-client-urls=http://milvus-etcd:2379",
              "--listen-client-urls", "http://0.0.0.0:2379",
              "--data-dir", "/etcd"]
    restart: unless-stopped

  milvus-minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    container_name: milvus-minio
    profiles: ["vector"]
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - milvus-minio:/minio_data
    command: minio server /minio_data
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.4.10
    container_name: milvus
    profiles: ["vector"]
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    depends_on:
      - milvus-etcd
      - milvus-minio
    ports:
      - "19530:19530"
    volumes:
      - milvus-data:/var/lib/milvus
    restart: unless-stopped

volumes:
  rag-data:
  milvus-etcd:
  milvus-minio:
  milvus-data:
