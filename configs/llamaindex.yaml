parsers:
  whole:
    strategy: whole
  sentence_512:
    strategy: sentence
    chunk_size: 512
    chunk_overlap: 50
    paragraph_separator: '


      '
  sentence_1024:
    strategy: sentence
    chunk_size: 1024
    chunk_overlap: 100
    paragraph_separator: '


      '
  short_paragraph:
    strategy: sentence
    chunk_size: 256
    chunk_overlap: 30
    paragraph_separator: '

      '
  token_512:
    strategy: token
    chunk_size: 512
    chunk_overlap: 50
  semantic:
    strategy: semantic
    chunk_size: 512
    buffer_size: 1
    breakpoint_percentile_threshold: 95
  semantic_aggressive:
    strategy: semantic
    chunk_size: 512
    buffer_size: 5
    breakpoint_percentile_threshold: 60
  semantic_conservative:
    strategy: semantic
    chunk_size: 512
    buffer_size: 1
    breakpoint_percentile_threshold: 99
  sentence_256:
    name: sentence_256
    strategy: token
    chunk_size: 128
    chunk_overlap: 10
    paragraph_separator: '


      '
settings:
  enabled: true
  over_fetch: 4
  llm:
    provider: none
    model: ''
    api_key: ''
