rerankers:
  none:
    provider: none
    top_k: 5
    description: 不做重排，仅截断到 top_k。用于不想启用重排的 KB。
  passthrough:
    provider: mock
    top_k: 5
    description: 同 none，保留 mock 作为别名。
  bge_m3:
    provider: bge
    model_name: BAAI/bge-reranker-v2-m3
    top_k: 5
    extra:
      use_fp16: true
      batch_size: 32
    description: BGE Reranker v2-m3，多语言（含中文），本地推理
  bge_large:
    provider: bge
    model_name: BAAI/bge-reranker-large
    top_k: 5
    extra:
      use_fp16: true
      batch_size: 16
    description: BGE Reranker large，英文为主
  cohere_v3:
    provider: cohere
    model_name: rerank-v3.5
    top_k: 5
    extra:
      api_key: ${COHERE_API_KEY}
      timeout: 30.0
      max_retries: 3
    description: Cohere rerank-v3.5，100+ 语言，质量高，API 调用
  cohere_en:
    provider: cohere
    model_name: rerank-english-v3.0
    top_k: 5
    extra:
      api_key: ${COHERE_API_KEY}
    description: Cohere rerank-english-v3.0，英文为主，速度更快
  local_bge_reranker_base:
    provider: http
    protocol: tei
    model_name: BAAI/bge-reranker-base
    top_k: 3
    extra:
      base_url: http://127.0.0.1:8080
      timeout: 60
      truncate_input_tokens: 512
      max_retries: 3
      retry_backoff: 0.5
    description: 本地 TEI 部署的 BGE-reranker-base（/rerank 协议，端口 8080，中文专用 cross-encoder）
  tei_bge_m3:
    provider: http
    protocol: tei
    model_name: BAAI/bge-reranker-v2-m3
    top_k: 5
    extra:
      base_url: http://127.0.0.1:8081
      timeout: 30.0
      truncate_input_tokens: 512
      max_retries: 3
      retry_backoff: 0.5
    description: TEI 部署的 BGE-reranker-v2-m3（/rerank 协议，多语言，参考示例）
  local_bge_large:
    provider: http
    protocol: tei
    model_name: BAAI/bge-reranker-large
    top_k: 5
    extra:
      base_url: http://10.0.0.5:8082
      api_key: ${LOCAL_RERANK_API_KEY}
      timeout: 30.0
    description: 本地 BGE-reranker-large（英文）
  local_cohere_compat:
    provider: http
    protocol: cohere_compat
    model_name: rerank-multilingual-v3.0
    top_k: 5
    extra:
      base_url: http://10.0.0.5:8083
      api_key: ${LOCAL_RERANK_API_KEY}
      timeout: 30.0
    description: 私有部署的 Cohere 兼容服务
